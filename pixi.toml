[workspace]
name = "semantic-drift-tech"
channels = ["conda-forge"]
platforms = ["osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
pandas = ">=2.0"
numpy = ">=1.26"
matplotlib = ">=3.8"
scipy = ">=1.12"
scikit-learn = ">=1.4"
plotly = ">=5.20"
jupyter = ">=1.0"
ipykernel = ">=6.29"
tqdm = ">=4.66"
requests = ">=2.31"
gensim = ">=4.3"
ruptures = ">=1.1"

[tasks]
render     = "quarto render semantic-drift-tech.qmd"
render-pdf = "quarto render semantic-drift-tech.qmd --to pdf"
preview    = "quarto preview semantic-drift-tech.qmd"
download   = "python data/raw/download_vectors.py"
